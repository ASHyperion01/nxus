<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CAM-LAG // N3XUS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="cvs"></canvas>

<div id="hud-top">
  <div class="logo">N3XUS<em>.</em>CAM-LAG</div>
  <div id="status">OFFLINE</div>
</div>

<div class="brk tl"></div>
<div class="brk tr"></div>
<div class="brk bl"></div>
<div class="brk br"></div>

<div id="lag-badge">1000ms</div>

<div id="panel">
  <div class="row">
    <span class="lbl">DELAY</span>
    <input type="range" id="slider" min="1" max="50" value="10">
    <span class="val" id="valLabel">1.0s</span>
  </div>
  <div class="btns">
    <button class="btn" id="btnFreeze">FREEZE</button>
    <button class="btn" id="btnHide">HIDE UI</button>
    <button class="btn" id="btnConfig">CONFIG</button>
  </div>
  <div class="info-row">
    <span>BUF: <span id="bufInfo">0</span> frames</span>
    <span>FPS: <span id="fpsInfo">--</span></span>
    <span id="streamType">--</span>
  </div>
</div>

<div id="overlay">
  <h1>CAM-LAG</h1>
  <p>IP / WIRELESS CAMERA DELAY<br>MJPEG · HLS · MP4</p>

  <div class="input-group">
    <label>STREAM URL</label>
    <input type="text" id="urlInput" placeholder="http://192.168.1.x/video.mjpeg" autocomplete="off" spellcheck="false">
  </div>

  <div class="input-row">
    <div class="input-group half">
      <label>TYPE</label>
      <select id="typeSelect">
        <option value="auto">AUTO DETECT</option>
        <option value="mjpeg">MJPEG</option>
        <option value="hls">HLS (.m3u8)</option>
        <option value="video">MP4 / WEBM</option>
      </select>
    </div>
    <div class="input-group half">
      <label>INIT DELAY</label>
      <select id="delaySelect">
        <option value="500">0.5s</option>
        <option value="1000" selected>1.0s</option>
        <option value="2000">2.0s</option>
        <option value="5000">5.0s</option>
      </select>
    </div>
  </div>

  <div class="preset-label">QUICK CONNECT</div>
  <div class="presets">
    <button class="preset-btn" data-url="http://192.168.1.1/video.mjpeg" data-type="mjpeg">192.168.1.1</button>
    <button class="preset-btn" data-url="http://192.168.0.1/video.mjpeg" data-type="mjpeg">192.168.0.1</button>
    <button class="preset-btn" data-url="http://10.0.0.1/video.mjpeg"    data-type="mjpeg">10.0.0.1</button>
  </div>

  <button id="connectBtn">[ CONNECT ]</button>
  <div id="errMsg"></div>

  <div class="note">
    ⚠ RTSP → use VLC to transcode to MJPEG first<br>
    Camera &amp; browser must be on the same network
  </div>
</div>

<video id="vid" autoplay playsinline muted crossorigin="anonymous"></video>
<img   id="mjpegImg" crossorigin="anonymous" alt="">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="script.js"></script>
</body>
</html>
