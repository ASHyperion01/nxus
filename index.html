<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FF6200">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>FlipperRemote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="device" id="device">

  <!-- Side vol buttons (left) -->
  <button class="side-btn side-vol-up"   id="sideUp"   title="Vol +">+</button>
  <button class="side-btn side-vol-down" id="sideDown" title="Vol −">−</button>

  <!-- Top bar: USB-C + LEDs -->
  <div class="device-topbar">
    <div class="usb-port"></div>
    <div class="leds">
      <span class="led" id="ledG" title="Ready"></span>
      <span class="led led-o" id="ledO" title="IR/TX"></span>
      <span class="led led-r" id="ledR" title="Alert"></span>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen-wrap">
    <div class="screen" id="screen">
      <div class="scr-header" id="scrHeader">
        <span id="hTitle">FLIPPER REMOTE</span>
        <div class="hicons">
          <span id="hBT">BT</span>
          <span id="hNFC">NFC</span>
          <span id="hSig">~~~</span>
          <span id="hBat">---</span>
        </div>
      </div>
      <div class="scr-body" id="scrBody"></div>
      <div class="scr-scanlines"></div>
    </div>
    <div class="ir-dot" id="irDot"></div>
  </div>

  <!-- Controls -->
  <div class="ctrl-row">
    <button class="btn-back" id="btnBack">◄ BACK</button>
    <div class="dpad">
      <button class="dp dp-up"    id="dpUp">▲</button>
      <div class="dp-mid">
        <button class="dp dp-left"  id="dpLeft">◄</button>
        <button class="dp dp-ok"    id="dpOk">OK</button>
        <button class="dp dp-right" id="dpRight">►</button>
      </div>
      <button class="dp dp-down"  id="dpDown">▼</button>
    </div>
  </div>

  <!-- Extra app buttons (dynamic) -->
  <div class="xbtns" id="xbtns"></div>

  <!-- Brand -->
  <div class="brand">FLIPPER REMOTE  ◈  v1.0</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
