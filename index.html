<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FF6200">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlipperRemote">
<title>FlipperRemote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="device" id="device">
  <button class="side-btn side-up"   id="sideUp">+</button>
  <button class="side-btn side-down" id="sideDown">−</button>
  <div class="top-bar">
    <div class="usb-c"></div>
    <div class="leds">
      <span class="led"     id="ledG"></span>
      <span class="led lo"  id="ledO"></span>
      <span class="led lr"  id="ledR"></span>
    </div>
  </div>
  <div class="screen-frame">
    <div class="screen" id="screen">
      <div class="statusbar">
        <span id="sbTitle">FLIPPER REMOTE</span>
        <div class="sbright">
          <span id="sbBt"   class="sbi">BT</span>
          <span id="sbNfc"  class="sbi">NFC</span>
          <span id="sbNet"  class="sbi">~~~</span>
          <span id="sbBat"  class="sbi">---</span>
        </div>
      </div>
      <div class="scr-body" id="scrBody"></div>
      <div class="phosphor"></div>
      <div class="scanlines"></div>
    </div>
    <div class="ir-dot" id="irDot"></div>
  </div>
  <div class="controls">
    <button class="btn-back" id="btnBack">◄ BACK</button>
    <div class="dpad">
      <button class="dp dp-u" id="dpU">▲</button>
      <div class="dp-row">
        <button class="dp dp-l" id="dpL">◄</button>
        <button class="dp dp-ok" id="dpOk">OK</button>
        <button class="dp dp-r" id="dpR">►</button>
      </div>
      <button class="dp dp-d" id="dpD">▼</button>
    </div>
  </div>
  <div class="ctx" id="ctx"></div>
  <div class="brand">FLIPPER REMOTE ◈ v2.0</div>
</div>
<div class="modal" id="modal"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
