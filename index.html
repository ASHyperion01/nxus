<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FF6200">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FlipperRemote</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="device">
  <button class="side-btn sv-up" id="sideUp">+</button>
  <button class="side-btn sv-dn" id="sideDown">−</button>
  <div class="topbar">
    <div class="usb-port"></div>
    <div class="leds">
      <span class="led" id="ledG"></span>
      <span class="led lo" id="ledO"></span>
      <span class="led lr" id="ledR"></span>
    </div>
  </div>
  <div class="scr-wrap">
    <div class="screen">
      <div class="sbar">
        <span class="sbar-title" id="sbarTitle">FLIPPER REMOTE</span>
        <div class="sbar-r">
          <span class="sbi" id="sBt">BT</span>
          <span class="sbi" id="sNfc">NFC</span>
          <span class="sbi" id="sNet">NET</span>
          <span class="sbi" id="sBat">---</span>
        </div>
      </div>
      <div class="scr" id="scr"></div>
      <div class="load-wrap"><div class="load-fill" id="loadFill"></div></div>
      <div class="phosphor"></div>
      <div class="scanlines"></div>
    </div>
    <div class="ir-dot" id="ir"></div>
  </div>
  <div class="ctrls">
    <button class="btn-back" id="btnBack">◄ BACK</button>
    <div class="dpad">
      <button class="dp dpu" id="dpu">▲</button>
      <div class="dprow">
        <button class="dp dpl" id="dpl">◄</button>
        <button class="dp dpok" id="dpok">OK</button>
        <button class="dp dpr" id="dpr">►</button>
      </div>
      <button class="dp dpd" id="dpd">▼</button>
    </div>
  </div>
  <div class="ctx" id="ctx"></div>
  <div class="brand-txt">FLIPPER REMOTE  ◈  v4.0</div>
</div>
<div class="modal" id="modal"><div class="mbox" id="mbox"></div></div>
<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
