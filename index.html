<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Roblox</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://images.rbxcdn.com/e854eb7b2951ac03edba9a2681032bba.ico">
</head>
<body class="rbx-body dark-theme">
    <div id="wrap" class="wrap no-gutter-ads logged-out">
        <div id="navigation-container" class="builder-font">
            <div id="header" class="navbar-fixed-top rbx-header">
                <div class="container-fluid">
                    <div class="rbx-navbar-header">
                        <div class="navbar-header">
                            <a id="nav-logo-link" class="navbar-brand" href="/home">
                                <span class="icon-logo"></span><span class="icon-logo-r"></span>
                            </a>
                        </div>
                    </div>
                    <ul class="nav rbx-navbar hidden-xs hidden-sm col-md-5 col-lg-4">
                        <li><a id="nav-charts-md-link" class="font-header-2 nav-menu-title" href="/charts">Charts</a></li>
                        <li><a id="nav-marketplace-md-link" class="font-header-2 nav-menu-title" href="/catalog">Marketplace</a></li>
                        <li><a id="header-develop-md-link" class="font-header-2 nav-menu-title" href="/develop">Create</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <main class="container-main content-no-ads" id="container-main">
            <div class="content" id="content">
                <div class="login-container" id="fake-login-container">
                    <div class="login-card">
                        <div class="login-title">
                            <h1>Log in to Roblox</h1>
                        </div>
                        <form id="login-form" action="#" method="post">
                            <div class="input-field">
                                <label for="username-email">Username / Email</label>
                                <input type="text" id="username-email" name="username" autocomplete="username" required>
                            </div>
                            <div class="input-field">
                                <label for="password">Password</label>
                                <input type="password" id="password" name="password" autocomplete="current-password" required>
                            </div>
                            <div class="login-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="remember-me"> Keep me logged in
                                </label>
                                <a href="#" class="forgot-password">Forgot Password?</a>
                            </div>
                            <button type="submit" class="login-button">Log In</button>
                        </form>
                        <div class="signup-redirect">
                            <span>Don't have an account? <a href="#">Sign up</a></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer class="container-footer" id="footer-container"></footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
